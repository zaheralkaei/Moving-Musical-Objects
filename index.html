<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Moving Musical Objects by Zaher Alkaei</title>
  <style>
    body {
      background-color: #1e1e1e;
      color: #e0e0e0;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 0;
    }

    .header {
      width: 100%;
      box-sizing: border-box;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 20px;
      position: relative;
    }

    h1 {
      color: #ff4081;
      font-size: 24px;
      margin: 0;
      text-align: center;
      flex: 1;
      /* On narrow screens, allow the title to wrap to two lines and shrink
         the font so it fits the viewport without overflowing. */
      min-width: 0;
    }
    @media (max-width: 480px) {
      h1 { font-size: 18px; }
    }

    canvas {
      border: 5px solid #ff4081;
      margin-bottom: 20px;
      /* Responsive scaling: on a 375px-wide phone the canvas would otherwise
         overflow horizontally. Scaling with CSS (not the canvas's internal
         coordinate system) keeps the simulation logic at 800x600 — only the
         visual size changes. The aspect ratio is preserved by setting only
         max-width and letting height auto-compute. */
      max-width: 100%;
      height: auto;
      display: block;
      /* Centre the canvas when it shrinks. */
      margin-left: auto;
      margin-right: auto;
      box-sizing: border-box;
    }

    .controls {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      /* On narrow screens (mobile), constrain the controls' width to the
         viewport minus padding so long labels like "NoiseSynth (hat/cymbal)"
         and the volume slider don't push the layout sideways. */
      max-width: calc(100vw - 24px);
      box-sizing: border-box;
    }
    .controls select, .controls input[type="range"] {
      /* The synth dropdown and slider can exceed their label width on
         mobile. Force them to fit within the parent so the whole panel
         stays inside the viewport. */
      max-width: 100%;
    }

    .checkboxes {
      display: flex;
      gap: 10px;
    }

    .checkboxes label {
      color: #fff;
    }

    .controls label {
      color: #fff;
      display: block;
    }

    #startButton, .effectButton, #aboutButton {
      background-color: #e0e0e0;
      color: #1e1e1e;
      padding: 10px 20px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 16px;
      margin-top: 10px;
      /* Disable iOS Safari's 300ms double-tap-to-zoom delay on these
         controls. Without this, the first tap on a button feels sluggish. */
      touch-action: manipulation;
    }

    #startButton:hover, .effectButton:hover, #aboutButton:hover {
      background-color: #ff4081;
      color: #fff;
    }

    /* The Start button is the primary action — the only one that turns the
       page from a static image into a running simulation. Make it visually
       dominant: brand-pink background by default (not just on hover), larger
       font, generous padding, a drop shadow for depth, and a subtle pulse
       animation to draw the eye. The effect buttons (Reverb, Drone) and the
       About button keep the muted style so the hierarchy is clear. */
    #startButton {
      background-color: #ff4081;
      color: #fff;
      font-size: 20px;
      font-weight: bold;
      padding: 14px 36px;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-top: 14px;
      box-shadow: 0 4px 12px rgba(255, 64, 129, 0.4);
      animation: startPulse 2.4s ease-in-out infinite;
      /* Mobile: prevent the button from being wider than the viewport, and
         scale padding/font down on the smallest screens so "START" doesn't
         get truncated. */
      max-width: 100%;
    }
    /* On screens narrower than 420px, scale the Start button padding so it
       doesn't crowd the edges. The pulse animation is preserved. */
    @media (max-width: 420px) {
      #startButton {
        font-size: 18px;
        padding: 12px 24px;
        letter-spacing: 0.5px;
      }
    }
    #startButton:hover {
      background-color: #fff;
      color: #ff4081;
      box-shadow: 0 6px 16px rgba(255, 64, 129, 0.6);
    }
    @keyframes startPulse {
      0%, 100% { box-shadow: 0 4px 12px rgba(255, 64, 129, 0.4); }
      50%      { box-shadow: 0 4px 20px rgba(255, 64, 129, 0.75); }
    }

    .popup-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      z-index: 999;
    }

    .popup {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      background-color: #333;
      color: #fff;
      padding: 20px;
      border-radius: 8px;
      width: 300px;
      max-width: calc(100vw - 40px);
      box-sizing: border-box;
      text-align: center;
    }

    .popup button {
      margin-top: 20px;
      background-color: #ff4081;
      color: #fff;
      padding: 10px 20px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    .popup button:hover {
      background-color: #ff0051;
    }

    .message {
      display: none;
      background-color: #ff4081;
      color: #fff;
      padding: 10px 20px;
      border-radius: 5px;
      margin-bottom: 10px;
      text-align: center;
      min-width: 280px;
    }

    /* Note indicator: shows the pitches currently ringing. Each chip fades out
       as the note ages; the visual lifetime matches the audible release tail
       (see noteIndicator entries in app.js). */
    /* The container is a fixed-height box (two rows of chips). When more
       notes ring than fit in two rows, the extra rows scroll INSIDE this
       box rather than the box growing and pushing the Start button and
       other controls downward. The controls below stay in exactly the
       same position no matter how busy the indicator gets. */
    #noteIndicator {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      justify-content: center;
      align-content: flex-start;
      height: 62px;
      overflow-y: auto;
      padding: 2px 4px;
      margin: 0 0 12px 0;
      /* On wide screens cap at 800px (matches canvas width). On narrow
         mobile screens, fit the viewport so the indicator never overflows. */
      max-width: min(800px, calc(100vw - 24px));
      box-sizing: border-box;
    }
    .noteChip {
      background-color: #2a2a2a;
      color: #ff4081;
      border: 1px solid #ff4081;
      border-radius: 4px;
      padding: 4px 10px;
      font-family: 'Courier New', monospace;
      font-size: 14px;
      font-weight: bold;
      /* Opacity is animated by JS via inline style.transition; the base
         opacity is full so the JS only needs to fade OUT, not fade IN. */
      transition: opacity 0.4s ease-out;
    }
    .noteChip.drone {
      /* Drone is sustained, so colour it differently to set it apart from
         the percussive notes. Same fade rules otherwise. */
      background-color: #1a3a4a;
      color: #7fdfff;
      border-color: #7fdfff;
    }
  </style>
</head>
<body>
  <div class="header">
    <button id="aboutButton">About</button>
    <h1>Moving Musical Objects by Zaher Alkaei</h1>
    <div style="width: 80px;"></div>
  </div>

  <div class="popup-backdrop" id="popupBackdrop"></div>
  <div class="popup" id="aboutPopup">
    <h2>About this app</h2>
    <p>This app was designed by Zaher Alkaei to explore generative music using moving visual objects. Select objects, apply effects, and enjoy the soundscapes!</p>
    <button id="closePopup">Close</button>
  </div>

  <canvas id="musicCanvas" width="800" height="600"></canvas>
  <div class="message" id="message"></div>
  <div id="noteIndicator" aria-label="Currently playing notes"></div>
  <p>Choose which musical objects will be displayed:</p>
  <div class="controls">
    <div class="checkboxes">
      <label><input type="checkbox" id="object1" checked> 1</label>
      <label><input type="checkbox" id="object2" checked> 2</label>
      <label><input type="checkbox" id="object3" checked> 3</label>
      <label><input type="checkbox" id="object4" checked> 4</label>
      <label><input type="checkbox" id="object5" checked> 5</label>
    </div>

    <label>Speed:
      <input type="range" id="objectSpeed" min="1" max="10" value="3">
      <span id="speedDisplay">3</span>
    </label>

    <label>Scale Type:
      <select id="scaleType">
        <option value="tonal">Tonal (Major) Scale</option>
        <option value="chromatic">Chromatic Scale</option>
        <option value="minor">Natural Minor Scale</option>
        <option value="pentatonic">Pentatonic Scale</option>
        <option value="dorian">Dorian Mode</option>
        <option value="phrygian">Phrygian Mode</option>
        <option value="lydian">Lydian Mode</option>
        <option value="mixolydian">Mixolydian Mode</option>
        <option value="locrian">Locrian Mode</option>
        <option value="blues">Blues Scale</option>
        <option value="harmonicMinor">Harmonic Minor Scale</option>
        <option value="melodicMinor">Melodic Minor Scale</option>
        <option value="doubleHarmonic">Double Harmonic Scale</option>
        <option value="hungarianMinor">Hungarian Minor Scale</option>
        <option value="japanese">Japanese Scale (Yo)</option>
        <option value="hirajoshi" selected>Hirajoshi Scale</option>
      </select>
    </label>

    <label>Synth Type:
      <select id="synthType">
        <option value="synth">Synth</option>
        <option value="amsynth">AMSynth</option>
        <option value="fmsynth" selected>FMSynth</option>
        <option value="duosynth">DuoSynth</option>
        <option value="polysynth">PolySynth</option>
        <option value="mono">MonoSynth (bass/lead)</option>
        <option value="membrane">MembraneSynth (kick/tom)</option>
        <option value="metal">MetalSynth (bell/gamelan)</option>
        <option value="noise">NoiseSynth (hat/cymbal)</option>
      </select>
    </label>

    <button id="startButton">Start</button>
    <button class="effectButton" id="reverbButton">Disable Reverb</button>
    <button class="effectButton" id="droneButton">Disable Drone</button>
    <label>Drone Volume:
      <input type="range" id="droneVolume" min="0" max="100" value="100">
      <span id="droneVolumeDisplay">100</span>
    </label>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.39/Tone.js"
          integrity="sha384-4hUD4C/ZiNVf3ENQONvfZtvwyeHKPj8qHUfdmaWhMgGuuw4+H+TZOHdinGoEfsIa"
          crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <script src="app.js"></script>
</body>
</html>
